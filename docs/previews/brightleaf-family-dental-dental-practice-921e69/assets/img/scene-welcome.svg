<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 440" role="img" aria-label="Illustration of a warm welcome to the practice — an open door and friendly reception">
  <defs>
    <linearGradient id="swBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EAF7F1"/><stop offset="1" stop-color="#F4FAF7"/>
    </linearGradient>
    <linearGradient id="swDoor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FCE7BE"/><stop offset="1" stop-color="#FBFAF6"/>
    </linearGradient>
  </defs>
  <rect width="500" height="440" fill="url(#swBg)"/>
  <circle cx="424" cy="88" r="52" fill="#D1F0E6" opacity="0.55"/>
  <circle cx="70" cy="330" r="56" fill="#D1F0E6" opacity="0.45"/>
  <!-- floor -->
  <rect y="358" width="500" height="82" fill="#DCEFE7"/>
  <line x1="0" y1="358" x2="500" y2="358" stroke="#C6E6D9" stroke-width="2"/>
  <!-- doorway -->
  <path d="M150 358 V150 a100 100 0 0 1 200 0 V358 Z" fill="#0F766E"/>
  <path d="M168 358 V152 a82 82 0 0 1 164 0 V358 Z" fill="url(#swDoor)"/>
  <path d="M250 358 V70" fill="none" stroke="#0F766E" stroke-width="4"/>
  <!-- light pool -->
  <path d="M168 358 L250 358 L312 440 L120 440 Z" fill="#FCE7BE" opacity="0.6"/>
  <!-- door handles -->
  <circle cx="234" cy="262" r="7" fill="#0F766E"/>
  <circle cx="266" cy="262" r="7" fill="#0F766E"/>
  <!-- welcome mat -->
  <ellipse cx="250" cy="392" rx="92" ry="20" fill="#D1F0E6"/>
  <ellipse cx="250" cy="392" rx="62" ry="11" fill="#FBFAF6"/>
  <!-- potted plant -->
  <g>
    <path d="M392 358 c2-40 18-62 18-62 s16 22 18 62 Z" fill="#23B07A"/>
    <path d="M410 318 c18-10 38-8 38-8 s-10 22-32 24 Z" fill="#0A544E"/>
    <path d="M386 332 h48 l-7 32 a7 7 0 0 1-7 6 H400 a7 7 0 0 1-7-6 Z" fill="#D9912A"/>
  </g>
  <!-- heart welcome -->
  <path d="M250 196 c-10-16-38-13-38 10 0 18 26 30 38 42 12-12 38-24 38-42 0-23-28-26-38-10 Z" fill="#F0AB40"/>
</svg>
