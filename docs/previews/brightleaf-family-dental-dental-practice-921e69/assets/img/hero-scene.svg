<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 484" role="img" aria-label="Illustration of a calm, light-filled modern dental treatment room">
  <defs>
    <linearGradient id="hsBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EAF7F1"/><stop offset="1" stop-color="#F4FAF7"/>
    </linearGradient>
    <linearGradient id="hsWin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FCE7BE"/><stop offset="1" stop-color="#FBFAF6"/>
    </linearGradient>
  </defs>
  <rect width="440" height="484" fill="url(#hsBg)"/>
  <!-- soft decor -->
  <circle cx="60" cy="74" r="46" fill="#D1F0E6" opacity="0.55"/>
  <circle cx="392" cy="300" r="60" fill="#D1F0E6" opacity="0.4"/>
  <!-- floor -->
  <rect y="360" width="440" height="124" fill="#DCEFE7"/>
  <line x1="0" y1="360" x2="440" y2="360" stroke="#C6E6D9" stroke-width="2"/>
  <!-- window arch -->
  <path d="M104 208 V96 a116 116 0 0 1 232 0 V208 Z" fill="url(#hsWin)" stroke="#0F766E" stroke-width="3"/>
  <line x1="220" y1="44" x2="220" y2="208" stroke="#0F766E" stroke-width="3"/>
  <line x1="104" y1="128" x2="336" y2="128" stroke="#0F766E" stroke-width="3"/>
  <circle cx="220" cy="96" r="27" fill="#F0AB40"/>
  <circle cx="220" cy="96" r="27" fill="none" stroke="#FBFAF6" stroke-width="3"/>
  <rect x="92" y="208" width="256" height="13" rx="6.5" fill="#0F766E"/>
  <!-- potted plant -->
  <g>
    <path d="M70 360 c4-46 22-70 22-70 s18 24 22 70 Z" fill="#23B07A"/>
    <path d="M92 312 c-22-8-34-30-34-30 s26-2 40 16 Z" fill="#0A544E"/>
    <path d="M92 320 c20-12 44-10 44-10 s-12 24-36 28 Z" fill="#0A544E"/>
    <path d="M62 360 h60 l-8 44 a8 8 0 0 1-8 7 H78 a8 8 0 0 1-8-7 Z" fill="#D9912A"/>
  </g>
  <!-- overhead exam lamp -->
  <line x1="300" y1="221" x2="300" y2="262" stroke="#0A544E" stroke-width="6" stroke-linecap="round"/>
  <line x1="300" y1="262" x2="262" y2="286" stroke="#0A544E" stroke-width="6" stroke-linecap="round"/>
  <ellipse cx="256" cy="298" rx="30" ry="17" fill="#0F766E"/>
  <ellipse cx="256" cy="294" rx="22" ry="11" fill="#FCE7BE"/>
  <!-- dental chair (abstract) -->
  <g>
    <ellipse cx="214" cy="452" rx="80" ry="16" fill="#C6E6D9"/>
    <rect x="200" y="372" width="28" height="76" rx="10" fill="#0A544E"/>
    <rect x="150" y="338" width="150" height="40" rx="20" fill="#0F766E"/>
    <path d="M150 358 a20 20 0 0 1 20-20 h26 v40 h-26 a20 20 0 0 1-20-20 Z" fill="#0A544E"/>
    <rect x="262" y="252" width="40" height="118" rx="20" fill="#0F766E" transform="rotate(24 282 311)"/>
    <circle cx="312" cy="244" r="26" fill="#D1F0E6" stroke="#0F766E" stroke-width="4"/>
  </g>
  <!-- brand leaf accent -->
  <circle cx="372" cy="86" r="13" fill="#F0AB40"/>
</svg>
